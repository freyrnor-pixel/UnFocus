name: OTA Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update:
    name: Push OTA update
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate app.json (runtimeVersion / slug guardrail)
        run: node .github/scripts/check-app-config.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Push update
        run: |
          MSG=$(git log -1 --format=%s)
          # Publish BOTH platforms in a single atomic command → one update group covering
          # Android + iOS. Do NOT split this back into per-platform `eas update` calls: that
          # produced two separate update groups per release (iOS ~45s after Android, so iOS
          # always sorted newest on the EAS dashboard and every release read as "iOS-only"),
          # and under `set -e` a mid-sequence failure stranded the platforms on different code.
          # `--platform all` is the eas-cli default; stated explicitly for clarity.
          eas update --branch preview --platform all --message "$MSG"
