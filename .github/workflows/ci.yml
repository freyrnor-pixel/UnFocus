name: CI

# Quality gate for pull requests into main. Real users are on `main` (a merge
# publishes an OTA update on next launch), so typecheck + lint + tests must pass
# before a PR can merge. This is the only workflow that runs on pull_request —
# the others (update/build) run on push to main or manual dispatch.

on:
  pull_request:
    branches:
      - main

# Read-only: this workflow only inspects the code, it never writes to the repo.
permissions:
  contents: read

# A newer push to the same PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (with coverage)
        run: npm run test:coverage
