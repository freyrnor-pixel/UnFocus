name: EAS Build iOS (TestFlight)

# Manual, maintainer-run. Builds a store-distribution .ipa on the `preview` OTA
# channel (via the `testflight` profile in eas.json) and, unless disabled,
# submits it straight to TestFlight.
#
# One-time prerequisites (see AGENTS.md "iOS preview build" + PUBLISHING notes):
#   - Apple Developer Program membership.
#   - App record created in App Store Connect (bundle id com.freyrnorpixel.unfocus).
#   - iOS credentials on the EAS project: `eas credentials -p ios --profile testflight`.
#   - Repo secret EXPO_TOKEN (already used by the other EAS workflows).
#   - For auto-submit: repo secret ASC_API_KEY_P8 (contents of the App Store
#     Connect API key .p8) AND the ascApiKeyId / ascApiKeyIssuerId / appleTeamId /
#     ascAppId placeholders in eas.json's `submit.testflight.ios` filled in.
#     Leave `submit` off (input) until those are in place.

on:
  workflow_dispatch:
    inputs:
      message:
        description: Build message
        required: false
        type: string
      submit:
        description: Submit the build to TestFlight after it finishes
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: EAS Build + TestFlight submit (testflight profile)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate app.json (runtimeVersion / slug guardrail)
        run: node .github/scripts/check-app-config.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Build
        id: eas_build
        run: |
          eas build --platform ios --profile testflight --non-interactive --wait --message "${{ inputs.message || 'No message provided' }}" --json > build-result.json
          cat build-result.json
          BUILD_URL=$(node -p 'const b=require("./build-result.json")[0]; "https://expo.dev/accounts/"+b.project.ownerAccount.name+"/projects/"+b.project.slug+"/builds/"+b.id')
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"

      - name: Write App Store Connect API key
        if: ${{ inputs.submit }}
        run: |
          if [ -z "${{ secrets.ASC_API_KEY_P8 }}" ]; then
            echo "::error::inputs.submit is true but the ASC_API_KEY_P8 secret is not set — cannot submit to TestFlight. Add the secret or re-run with submit off."
            exit 1
          fi
          printf '%s' "${{ secrets.ASC_API_KEY_P8 }}" > asc-api-key.p8

      - name: Submit to TestFlight
        if: ${{ inputs.submit }}
        run: eas submit --platform ios --profile testflight --latest --non-interactive

      - name: Remove API key
        if: ${{ always() && inputs.submit }}
        run: rm -f asc-api-key.p8

      - name: Create build summary
        if: always()
        run: |
          echo "## EAS iOS Build (testflight)" >> $GITHUB_STEP_SUMMARY
          echo "Build message: ${{ inputs.message || 'No message provided' }}" >> $GITHUB_STEP_SUMMARY
          echo "Version: $(node -p "require('./app.json').expo.version") (runtimeVersion: $(node -p "require('./app.json').expo.runtimeVersion"))" >> $GITHUB_STEP_SUMMARY
          echo "Build page: ${{ steps.eas_build.outputs.build_url }}" >> $GITHUB_STEP_SUMMARY
          echo "Submit to TestFlight: ${{ inputs.submit }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Requires iOS credentials configured on the EAS project (eas credentials -p ios --profile testflight) — run that interactively once before the first build. Auto-submit also needs the ASC_API_KEY_P8 secret and the filled-in submit.testflight.ios fields in eas.json." >> $GITHUB_STEP_SUMMARY
