name: EAS Build iOS (Preview)

on:
  workflow_dispatch:
    inputs:
      message:
        description: Build message
        required: false
        type: string

jobs:
  build:
    name: EAS Build (preview profile)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate app.json (runtimeVersion / slug guardrail)
        run: node .github/scripts/check-app-config.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Build
        id: eas_build
        run: |
          eas build --platform ios --profile preview --non-interactive --wait --message "${{ inputs.message || 'No message provided' }}" --json > build-result.json
          cat build-result.json
          BUILD_URL=$(node -p "require('./build-result.json')[0].buildDetailsPageUrl")
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"

      - name: Create build summary
        if: always()
        run: |
          echo "## EAS iOS Build (preview)" >> $GITHUB_STEP_SUMMARY
          echo "Build message: ${{ inputs.message || 'No message provided' }}" >> $GITHUB_STEP_SUMMARY
          echo "Version: $(node -p "require('./app.json').expo.version") (runtimeVersion: $(node -p "require('./app.json').expo.runtimeVersion"))" >> $GITHUB_STEP_SUMMARY
          echo "Build page: ${{ steps.eas_build.outputs.build_url }}" >> $GITHUB_STEP_SUMMARY
          echo "Requires Apple credentials to already be configured on the EAS project (eas credentials -p ios) — run that interactively once before the first iOS build." >> $GITHUB_STEP_SUMMARY
