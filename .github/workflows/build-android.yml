# ⚠️ DEBUG build — produces app-debug.apk, which has expo-updates DISABLED.
# It will NEVER receive OTA updates: whoever installs it is frozen on the bundle
# embedded at build time. Do NOT hand this APK to testers. For an installable,
# OTA-capable build use the "EAS Build Android (Preview APK)" workflow
# (eas-build-android.yml) or `eas build -p android --profile preview`.
# This workflow is kept only for quick native/diagnostic debug APKs.
name: Build Android APK (DEBUG — no OTA, not for testers)

on:
  workflow_dispatch:
    inputs:
      message:
        description: Build message
        required: false
        type: string

jobs:
  build:
    name: Build Debug APK (arm64-v8a)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate app.json (runtimeVersion / slug guardrail)
        run: node .github/scripts/check-app-config.js

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK (arm64-v8a only)
        working-directory: android
        run: ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unfocus-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create build summary
        if: always()
        run: |
          echo "## ⚠️ DEBUG APK — does NOT receive OTA updates" >> $GITHUB_STEP_SUMMARY
          echo "This \`app-debug.apk\` is frozen on the bundle embedded at build time. Do **not** give it to testers." >> $GITHUB_STEP_SUMMARY
          echo "For an installable, self-updating build, run the **EAS Build Android (Preview APK)** workflow instead." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build message: ${{ inputs.message || 'No message provided' }}" >> $GITHUB_STEP_SUMMARY
          echo "Version: $(node -p "require('./app.json').expo.version") (runtimeVersion: $(node -p "require('./app.json').expo.runtimeVersion"))" >> $GITHUB_STEP_SUMMARY
          echo "Download APK from Artifacts" >> $GITHUB_STEP_SUMMARY
